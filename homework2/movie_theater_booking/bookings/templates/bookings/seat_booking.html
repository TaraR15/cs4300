<!DOCTYPE html>
<html>
<head>
    <title>Seat Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary">Booking for: {{ movie.title }}</h1>
        <p>{{ movie.description }}</p>
        <p><strong>Duration:</strong> {{ movie.duration }} minutes</p>
        
        <h2 class="mt-4">Available Seats</h2>
        <div class="row">
            {% for seat in seats %}
            <div class="col-md-2 mb-3">
                <div class="card {% if seat.is_booked %}bg-secondary{% else %}bg-success{% endif %} text-white">
                    <div class="card-body text-center">
                        <h5>Seat {{ seat.seat_number }}</h5>
                        {% if seat.is_booked %}
                            <span class="badge bg-dark">Booked</span>
                        {% else %}
                            <span class="badge bg-light text-dark">Available</span>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <a href="/" class="btn btn-primary mt-3">Back to Movies</a>
    </div>
</body>
</html>
